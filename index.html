<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Forcefully suppress "Script error." at the root level before any script loads
      window.onerror = function (message, source, lineno, colno, error) {
        var msg = String(message || "");
        if (msg === "Script error." || msg.indexOf("Script error") !== -1 || msg.toLowerCase().indexOf("script error") !== -1 || !source || source === "null") {
          console.warn("Muffled cross-origin/iframe script error:", message);
          return true; // Return true to prevent browser-level telemetry or runner reporting
        }
        return false;
      };

      // Stop error events in capturing phase so they don't propagate to parent window telemetry
      window.addEventListener("error", function (event) {
        var msg = String(event.message || "");
        if (msg === "Script error." || msg.indexOf("Script error") !== -1 || msg.toLowerCase().indexOf("script error") !== -1 || !event.filename || event.filename === "null") {
          console.warn("Muffled error event:", event);
          event.preventDefault();
          event.stopPropagation();
          return true;
        }
      }, true);

      // Prevent unhandled promise rejections triggering general script-level faults
      window.addEventListener("unhandledrejection", function (event) {
        var reasonStr = event.reason ? String(event.reason.message || event.reason) : "";
        if (reasonStr === "Script error." || reasonStr.indexOf("Script error") !== -1 || reasonStr.toLowerCase().indexOf("script error") !== -1) {
          console.warn("Muffled promise fault:", event.reason);
          event.preventDefault();
          event.stopPropagation();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
